<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card</title>
    <link rel="stylesheet" href="id.css">
</head>
<body>
    <div class="id-card">
        <div>
            <img src="https://tistcochin.edu.in/wp-content/uploads/2022/08/TISTlog-trans.png" alt="College Logo" class="college-logo" width="350" height="100">
        </div>
        
        <div class="photo-frame">
            <div class="photo-placeholder">
                <span>Photo</span>
            </div>
        </div>

        <div class="card-footer">
            <div class="info-row">
                <span class="label">Name:</span>
        
            </div>
            <div class="info-row">
                <span class="label">Branch:</span>
                
            </div>
        </div>
    </div>
</body>
</html>
