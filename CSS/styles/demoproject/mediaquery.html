<html lang="en">
<head>

        .red{

            height: 500px;
            width:800px;

            align-items: center;
            justify-content: center;
        }
        .green{

            height: 200px;

        }
        @media(min-width:200px) and (max-width:620px){

            }

        <div class="green "onclick="alert('hello')">

    </div>

        function alert(){
            console.log("hello");
            
        }
    </script>
