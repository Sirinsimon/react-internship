<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Away Button</title>
    <style>
        body{
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        button{
            height: 100px;
            width: 100px;
            background-color: red;
            position: absolute;
        }
    </style>
</head>
<body>

<button id="box"></button>

<script>
    let box = document.getElementById("box");

    box.addEventListener("mouseover", function () {

        let b1 = window.innerWidth - 100;
        let b2 = window.innerHeight - 100;

        let randomX = Math.floor(Math.random() * b1);
        let randomY = Math.floor(Math.random() * b2);

        box.style.left = randomX + "px";
        box.style.top = randomY + "px";
    });
</script>

</body>
</html>
