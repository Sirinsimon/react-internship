<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>run away button</title>
    <style>
        button{
            height: 100px;
            width: 100px;
            background-color: rgb(247, 7, 7);
        }

    </style>
</head>
<body>
    <button id="box"> catch me</button>
</body>
<script>
    let max = 20
    let box = document.getElementById("box")
    box.addEventListener("mouseover",function () {
        box.style.marginLeft = Math.floor(Math.random() * max)+"rem"
        console.log(Math.floor(Math.random()))
        box.style.marginTop = Math.floor(Math.random() * max)+"rem" 
    })

    setTimeout(function() {
        console.log("You cannot catch me!")
        let message = document.createElement("p")
        message.textContent = "You cannot catch me!"
        document.body.appendChild(message)
    }, 10000)

</script>
</html>
