<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            height: 3rem;
            width: 5rem;
            background-color: rgb(61, 158, 255);
        }

    </style>
</head>
<body>
    <button id="box">Catch ME</button>
</body>
<script>
    let max = 20
    let box = document.getElementById("box")
    box.addEventListener("mouseover",function () {
        box.style.marginLeft = Math.floor(Math.random() * max)+"rem"
        console.log(Math.floor(Math.random()))
        box.style.marginTop = Math.floor(Math.random() * max)+"rem" 
    })

</script>
</html>
