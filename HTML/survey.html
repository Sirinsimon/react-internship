<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>survey</title>
</head>
<body>
    <h1>Survey</h1>
    <br>
    <br>
    <form>
        <input type="text" placeholder="Name"><br>
        <input type="email" placeholder="Email"><br>
        <input type="number" placeholder="phone number"><br>
        <h3> Gender </h3>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>
        <br>
        <label for="country">Select your District:</label>
        <select id="District" name="District">
            <option value="option1">kottayam</option>
            <option value="option2">ernakulam</option>
            <option value="option3">kannur</option>
            <option value="option4">kozhikode</option>
            <option value="option5">thiruvananthapuram</option>

        
        </select>

        <br>
        <h3>Select language</h3>
        <input type="checkbox" id="english" name="language" value="english">
        <label for="english">English</label>
        <input type="checkbox" id="hindi" name="language" value="hindi">
        <label for="hindi">Hindi</label>
        <input type="checkbox" id="tamil" name="language" value="tamil">
        <label for="tamil">Tamil</label>
        <input type="checkbox" id="malayalam" name="language" value="malayalam">
        <label for="malayalam">Malayalam</label>    
        <br><br>
        <label for="date">Select your date of birth:</label><br>
        <input type ="date" id="date" name="date"><br>
        <br><br>

        <button>Submit</button>
    </form>

    
</body>
</html>
