<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-page {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
            padding: 36px 32px;
            max-width: 420px;
            width: 100%;
        }

        .signup-form {
            display: grid;
            gap: 18px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 12px;
            align-items: center;
        }

        .form-row label {
            text-align: right;
            font-weight: 600;
            color: #4a4a4a;
        }

        .form-row input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 1rem;
        }

        .form-actions {
            text-align: center;
            margin-top: 8px;
        }

        .form-actions button {
            width: 100%;
            padding: 12px 18px;
            background: #5b83d8;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
        }

        .form-actions button:hover {
            background: #4569c7;
        }
    </style>
</head>
<body>
    <div class="signup-page">
        <h1>Signup Page</h1>

        <form class="signup-form">
            <div class="form-row">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-row">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-row">
                <label for="phone">Phone:</label>
                <input type="number" id="phone" name="phone" required>
            </div>

            <div class="form-row">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-actions">
                <button type="submit">Sign Up</button>
            </div>
        </form>
    </div>
</body>
</html>
